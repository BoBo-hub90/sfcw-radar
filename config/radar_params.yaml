# SFCW Radar System Configuration
radar:
  f_start: 1.0e9
  f_stop:  4.0e9
  bandwidth: 3.0e9
  delta_f: 15.0e6
  n_steps: 201
  tx_power_dbm: -10

pluto:
  ip: "ip:192.168.2.1"
  sample_rate: 2.5e6
  rx_buffer_size: 1024
  dwell_buffers: 1   # buffers averaged per LO step (1 = fastest sweep)

processing:
  n_background_scans: 10
  respiration_band: [0.15, 0.40]
  heartrate_band:   [1.00, 2.50]
  sweep_period_s: 1.5              # slow-time sampling interval (s per sweep)
  doppler_motion_threshold_ms: 0.05 # |mean velocity| above this = "moving"

cfar:
  guard_cells: 2
  training_cells: 8
  false_alarm_rate: 1e-2   # relaxed from 1e-3 to 1e-2

performance:
  range_resolution_m: 0.05
  max_range_m: 10.0
