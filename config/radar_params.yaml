# SFCW Radar System Configuration
radar:
  f_start: 1.0e9
  f_stop:  4.0e9
  bandwidth: 3.0e9
  delta_f: 15.0e6
  n_steps: 201
  tx_power_dbm: -10    # reverted from 0; -10 dBm gave the best detection
                       # in testing (empty room ~14 dB, person 19-21 dB)

pluto:
  ip: "ip:192.168.2.1"
  sample_rate: 2.5e6
  rx_buffer_size: 1024
  rx_gain_db: 40       # reverted from 70; 40 dB gave the best detection
                       # in testing (empty room ~14 dB, person 19-21 dB)
  dwell_buffers: 1   # buffers averaged per LO step (1 = fastest sweep)

processing:
  n_background_scans: 10
  respiration_band: [0.15, 0.40]
  heartrate_band:   [1.00, 2.50]
  sweep_period_s: 1.5              # slow-time sampling interval (s per sweep)
  doppler_motion_threshold_ms: 0.05 # |mean velocity| above this = "moving"
  peak_to_mean_threshold: 1.3      # min peak/mean of range profile to run CFAR
  energy_threshold: 1.5            # current/background power ratio for detection
  energy_variance_threshold: 0.05  # std dev of recent energy ratios = motion
  detection_margin_db: 1.5         # dB the peak must exceed the empty-room baseline

cfar:
  guard_cells: 4
  training_cells: 16
  false_alarm_rate: 0.1   # very relaxed for bring-up

performance:
  range_resolution_m: 0.05
  max_range_m: 10.0
